name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Locate Gradle project
        id: locate
        run: |
          MATCH=$(find . -maxdepth 4 -name "settings.gradle.kts" | head -n 1)
          if [ -z "$MATCH" ]; then
            echo "Could not find settings.gradle.kts anywhere in the repo!"
            find . -maxdepth 3
            exit 1
          fi
          DIR=$(dirname "$MATCH")
          echo "project_dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Found Gradle project at: $DIR"

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NetPLCalculator-debug-apk
          path: ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
